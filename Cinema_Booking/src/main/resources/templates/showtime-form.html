<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Lập Lịch Suất Chiếu')}"></head>
<body class="bg-gray-50 min-h-screen font-sans pt-28 flex flex-col">
    <div th:replace="~{fragments :: common_header}"></div>

    <main class="max-w-xl mx-auto px-4 py-6 w-full flex-grow">
        <div class="bg-white p-8 rounded-2xl shadow-md border border-gray-200">
            <h2 class="text-xl font-black text-stone-900 mb-5 border-b pb-2 uppercase">➕ THIẾT LẬP SUẤT CHIẾU MỚI</h2>
            
            <div th:if="${errorMessage}" class="mb-4 bg-red-100 border border-red-400 text-red-700 p-4 rounded-xl text-xs font-bold shadow-sm" th:text="${errorMessage}"></div>

            <form th:action="@{/admin/showtimes/save}" th:object="${showtime}" method="POST" class="space-y-4">
                
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">1. Chọn Phim Chiếu *</label>
                    <select th:field="*{movie.movieId}" required class="w-full px-3 py-2 border rounded-lg text-sm bg-white outline-none">
                        <option value="">-- Chọn bộ phim --</option>
                        <option th:each="m : ${movies}" th:value="${m.movieId}" th:text="${m.title} + ' (' + ${m.duration} + ' phút)'"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">2. Chọn Phòng Chiếu *</label>
                    <select th:field="*{room.roomId}" required class="w-full px-3 py-2 border rounded-lg text-sm bg-white outline-none">
                        <option value="">-- Chọn phòng --</option>
                        <option th:each="r : ${rooms}" th:value="${r.roomId}" th:text="${r.roomName}"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">3. Thời Gian Bắt Đầu Khởi Chiếu *</label>
                    <input type="datetime-local" th:field="*{startTime}" required class="w-full px-3 py-2 border rounded-lg text-sm outline-none">
                </div>

                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">4. Thiết Lập Giá Vé Cơ Bản (VND) *</label>
                    <input type="number" th:field="*{price}" required min="10000" step="5000" class="w-full px-3 py-2 border rounded-lg text-sm outline-none" placeholder="Ví dụ: 80000">
                </div>

                <div class="pt-4 border-t flex justify-end space-x-3">
                    <a th:href="@{/admin/showtimes}" class="px-5 py-2 border rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-100">Quay lại</a>
                    <button type="submit" class="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm rounded-lg shadow uppercase">Kiểm Tra & Lưu</button>
                </div>
            </form>
        </div>
    </main>
    <div th:replace="~{fragments :: common_footer}"></div>
</body>
</html>
