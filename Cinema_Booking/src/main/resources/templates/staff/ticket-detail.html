<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Chi tiết vé - Nhân viên')}"></head>

<body class="bg-stone-950 text-stone-100 min-h-screen font-sans pt-20 flex flex-col">
<div th:replace="~{fragments :: common_header}"></div>

<main class="max-w-3xl mx-auto px-4 py-10 flex-grow w-full space-y-6">

    <!-- Breadcrumb -->
    <div class="flex items-center gap-2 text-sm text-stone-500">
        <a href="/staff/tickets/check" class="hover:text-amber-400 transition">
            <i class="fa-solid fa-arrow-left mr-1"></i>Quay lại tìm kiếm
        </a>
        <span>/</span>
        <span class="text-stone-300" th:text="'Vé #' + ${booking.bookingId}"></span>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="bg-emerald-900/40 border border-emerald-500/30 text-emerald-300 px-4 py-3 rounded-xl text-sm flex items-center gap-2">
        <i class="fa-solid fa-circle-check"></i> <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="bg-red-900/40 border border-red-500/30 text-red-300 px-4 py-3 rounded-xl text-sm flex items-center gap-2">
        <i class="fa-solid fa-circle-xmark"></i> <span th:text="${errorMessage}"></span>
    </div>

    <!-- ===== VÉ XEM PHIM (PRINTABLE) ===== -->
    <div id="ticket-card" class="bg-gradient-to-br from-stone-900 via-stone-800 to-stone-900 border border-stone-700 rounded-3xl overflow-hidden shadow-2xl">

        <!-- Header vé -->
        <div class="bg-gradient-to-r from-amber-600 to-yellow-500 px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-film text-black text-2xl"></i>
                <div>
                    <p class="text-black font-black text-xl tracking-wide">SMART CINEMA</p>
                    <p class="text-black/70 text-xs font-medium">Vé xem phim điện tử</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-black/70 text-xs font-medium uppercase">Mã đặt vé</p>
                <p class="text-black font-black text-2xl font-mono" th:text="'#' + ${booking.bookingId}"></p>
            </div>
        </div>

        <!-- Tên phim -->
        <div class="px-8 py-6 border-b border-stone-700/50">
            <p class="text-stone-400 text-xs uppercase tracking-widest font-semibold mb-1">Bộ phim</p>
            <h2 class="text-2xl font-black text-white" th:text="${booking.showtime.movie.title}">Tên phim</h2>
        </div>

        <!-- Thông tin chi tiết -->
        <div class="px-8 py-6 grid grid-cols-2 gap-6 border-b border-stone-700/50">
            <div>
                <p class="text-stone-500 text-xs uppercase tracking-widest font-semibold mb-1.5">
                    <i class="fa-solid fa-calendar-day mr-1"></i>Ngày chiếu
                </p>
                <p class="text-white font-bold text-base"
                   th:text="${#temporals.format(booking.showtime.startTime, 'EEEE, dd/MM/yyyy')}"></p>
            </div>
            <div>
                <p class="text-stone-500 text-xs uppercase tracking-widest font-semibold mb-1.5">
                    <i class="fa-solid fa-clock mr-1"></i>Giờ chiếu
                </p>
                <p class="text-amber-400 font-black text-2xl"
                   th:text="${#temporals.format(booking.showtime.startTime, 'HH:mm')}"></p>
            </div>
            <div>
                <p class="text-stone-500 text-xs uppercase tracking-widest font-semibold mb-1.5">
                    <i class="fa-solid fa-door-open mr-1"></i>Phòng chiếu
                </p>
                <p class="text-white font-bold text-base" th:text="${booking.showtime.room.roomName}"></p>
            </div>
            <div>
                <p class="text-stone-500 text-xs uppercase tracking-widest font-semibold mb-1.5">
                    <i class="fa-solid fa-couch mr-1"></i>Ghế ngồi
                </p>
                <div class="flex flex-wrap gap-1.5">
                    <span th:each="seat : ${seatList}"
                          class="bg-amber-500 text-black text-xs font-black px-2.5 py-1 rounded-lg"
                          th:text="${seat.trim()}"></span>
                </div>
            </div>
            <div>
                <p class="text-stone-500 text-xs uppercase tracking-widest font-semibold mb-1.5">
                    <i class="fa-solid fa-user mr-1"></i>Khách hàng
                </p>
                <p class="text-white font-bold" th:text="${booking.user.fullName}"></p>
                <p class="text-stone-400 text-xs" th:text="${booking.user.email}"></p>
            </div>
            <div>
                <p class="text-stone-500 text-xs uppercase tracking-widest font-semibold mb-1.5">
                    <i class="fa-solid fa-wallet mr-1"></i>Tổng tiền
                </p>
                <p class="text-green-400 font-black text-xl"
                   th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT') + ' đ'}"></p>
            </div>
        </div>

        <!-- Trạng thái vé + đường cắt -->
        <div class="relative px-8 py-5 flex justify-between items-center">
            <!-- Đường cắt vé -->
            <div class="absolute left-0 right-0 top-0 border-t border-dashed border-stone-700 mx-6"></div>
            <div class="absolute -left-3.5 -top-3.5 w-7 h-7 rounded-full bg-stone-950"></div>
            <div class="absolute -right-3.5 -top-3.5 w-7 h-7 rounded-full bg-stone-950"></div>

            <!-- Badge trạng thái -->
            <div>
                <p class="text-stone-500 text-xs uppercase tracking-widest font-semibold mb-1.5">Trạng thái</p>
                <span th:if="${booking.bookingStatus.name() == 'CONFIRMED'}"
                      class="inline-flex items-center gap-2 bg-emerald-500/15 text-emerald-400 font-bold px-4 py-2 rounded-xl border border-emerald-500/30">
                    <i class="fa-solid fa-circle-check text-lg"></i> Hợp lệ - Chưa soát
                </span>
                <span th:if="${booking.bookingStatus.name() == 'USED'}"
                      class="inline-flex items-center gap-2 bg-blue-500/15 text-blue-400 font-bold px-4 py-2 rounded-xl border border-blue-500/30">
                    <i class="fa-solid fa-door-open text-lg"></i> Đã soát vé
                </span>
                <span th:if="${booking.bookingStatus.name() == 'CANCELLED'}"
                      class="inline-flex items-center gap-2 bg-red-500/15 text-red-400 font-bold px-4 py-2 rounded-xl border border-red-500/30">
                    <i class="fa-solid fa-ban text-lg"></i> Đã hủy
                </span>
            </div>

            <!-- Ngày đặt vé -->
            <div class="text-right">
                <p class="text-stone-500 text-xs">Ngày đặt vé</p>
                <p class="text-stone-300 text-sm font-medium"
                   th:text="${#temporals.format(booking.bookingDate, 'dd/MM/yyyy HH:mm')}"></p>
            </div>
        </div>
    </div>

    <!-- Nút thao tác -->
    <div class="flex gap-3 flex-wrap no-print">

        <!-- Nút soát vé -->
        <form th:if="${booking.bookingStatus.name() == 'CONFIRMED'}"
              th:action="@{/staff/tickets/{id}/confirm(id=${booking.bookingId})}"
              method="post" class="flex-1">
            <button type="submit"
                    class="w-full bg-gradient-to-r from-emerald-500 to-green-500 hover:from-emerald-400 hover:to-green-400
                           text-white font-black py-3.5 rounded-xl text-sm shadow-lg shadow-emerald-500/20 transition">
                <i class="fa-solid fa-door-open mr-2"></i>Xác nhận soát vé
            </button>
        </form>

        <!-- Đã soát rồi -->
        <div th:if="${booking.bookingStatus.name() == 'USED'}"
             class="flex-1 bg-blue-900/30 border border-blue-500/30 text-blue-400 font-bold py-3.5 rounded-xl text-sm text-center">
            <i class="fa-solid fa-circle-check mr-2"></i>Vé đã được soát
        </div>

        <!-- Nút in vé -->
        <button onclick="printTicket()"
                class="flex-1 bg-stone-800 hover:bg-stone-700 border border-stone-600 text-stone-200 font-bold py-3.5 rounded-xl text-sm transition">
            <i class="fa-solid fa-print mr-2"></i>In vé
        </button>

        <!-- Quay lại -->
        <a href="/staff/tickets/check"
           class="flex-1 border border-stone-700 text-stone-400 hover:text-white hover:border-stone-500 font-bold py-3.5 rounded-xl text-sm text-center transition">
            <i class="fa-solid fa-arrow-left mr-2"></i>Tìm vé khác
        </a>
    </div>

</main>

<div th:replace="~{fragments :: common_footer}"></div>

<style>
    @media print {
        body { background: white !important; color: black !important; padding-top: 0 !important; }
        header, footer, .no-print { display: none !important; }
        main { max-width: 100% !important; padding: 0 !important; }
        #ticket-card {
            background: white !important;
            border: 2px solid #333 !important;
            box-shadow: none !important;
            color: black !important;
        }
        #ticket-card * { color: inherit !important; }
    }
</style>

<script>
    function printTicket() {
        window.print();
    }
</script>
</body>
</html>
