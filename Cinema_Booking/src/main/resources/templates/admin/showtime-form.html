<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Thêm Lịch Chiếu - Admin')}"></head>
<body class="bg-gray-50 min-h-screen font-sans pt-28 flex flex-col">

    <div th:replace="~{fragments :: common_header}"></div>

    <main class="max-w-2xl mx-auto px-4 py-6 w-full flex-grow">
        <div class="bg-white p-8 rounded-2xl shadow-md border border-gray-200">
            <h2 class="text-xl font-black text-stone-900 mb-5 border-b pb-2 uppercase">
                🎞️ Thêm Lịch Chiếu Mới
            </h2>

            <!-- Thông báo lỗi -->
            <div th:if="${errorMessage}" class="mb-4 bg-red-100 text-red-700 p-3 rounded-lg text-xs font-semibold"
                 th:text="${errorMessage}"></div>

            <form th:action="@{/admin/showtimes/save}" method="POST" class="space-y-4">

                <!-- Phim -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Phim *</label>
                    <select name="movieId" required
                            class="w-full px-3 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-amber-400">
                        <option value="">-- Chọn phim --</option>
                        <option th:each="m : ${movies}"
                                th:value="${m.movieId}"
                                th:text="${m.title}"></option>
                    </select>
                </div>

                <!-- Phòng chiếu -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Phòng Chiếu *</label>
                    <select name="roomId" required
                            class="w-full px-3 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-amber-400">
                        <option value="">-- Chọn phòng --</option>
                        <option th:each="r : ${rooms}"
                                th:value="${r.roomId}"
                                th:text="${r.roomName}"></option>
                    </select>
                </div>

                <!-- Thời gian bắt đầu -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Thời Gian Bắt Đầu *</label>
                    <input type="datetime-local" name="startTime" required
                           class="w-full px-3 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-amber-400">
                </div>

                <!-- Giá vé -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Giá Vé (₫) *</label>
                    <input type="number" name="price" required min="0" step="1000"
                           class="w-full px-3 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-amber-400"
                           placeholder="Ví dụ: 75000">
                </div>

                <!-- Buttons -->
                <div class="pt-4 border-t flex justify-end space-x-3">
                    <a th:href="@{/admin/showtimes}" class="px-5 py-2 border rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-100">Hủy</a>
                    <button type="submit" class="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm rounded-lg shadow">Lưu Lại</button>
                </div>
            </form>
        </div>
    </main>

    <div th:replace="~{fragments :: common_footer}"></div>
</body>
</html>
