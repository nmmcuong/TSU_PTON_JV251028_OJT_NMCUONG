<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Cấu Hình Phim')}"></head>
<body class="bg-gray-50 min-h-screen font-sans pt-28 flex flex-col">

    <div th:replace="~{fragments :: common_header}"></div>

    <main class="max-w-2xl mx-auto px-4 py-6 w-full flex-grow">
        <div class="bg-white p-8 rounded-2xl shadow-md border border-gray-200">
            <h2 class="text-xl font-black text-stone-900 mb-5 border-b pb-2 uppercase"
                th:text="${movie.movieId == null ? '➕ Thêm Phim Mới' : '📝 Sửa Thông Tin Phim'}"></h2>

            <form th:action="@{/admin/movies/save}" th:object="${movie}" method="POST" class="space-y-4">
                <input type="hidden" th:field="*{movieId}">

                <!-- Trạng thái -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Trạng Thái *</label>
                    <select th:field="*{status}" class="w-full px-3 py-2 border rounded-lg text-sm outline-none">
                        <option value="NOW_SHOWING">● Đang Chiếu</option>
                        <option value="COMING_SOON">● Sắp Chiếu</option>
                        <option value="STOPPED">● Ngừng Chiếu</option>
                    </select>
                </div>

                <!-- Tên phim -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Tên Phim *</label>
                    <input type="text" th:field="*{title}" required
                           class="w-full px-3 py-2 border rounded-lg text-sm outline-none"
                           placeholder="Ví dụ: Avengers: Endgame">
                </div>

                <!-- Thời lượng & Ngôn ngữ -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Thời Lượng (Phút) *</label>
                        <input type="number" th:field="*{duration}" required min="1"
                               class="w-full px-3 py-2 border rounded-lg text-sm outline-none"
                               placeholder="120">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Ngôn Ngữ *</label>
                        <input type="text" th:field="*{language}" required
                               class="w-full px-3 py-2 border rounded-lg text-sm outline-none"
                               placeholder="Tiếng Việt / English">
                    </div>
                </div>

                <!-- Ngày khởi chiếu & Giới hạn tuổi -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Ngày Khởi Chiếu</label>
                        <input type="date" th:field="*{releaseDate}"
                               class="w-full px-3 py-2 border rounded-lg text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Giới Hạn Tuổi</label>
                        <select th:field="*{ageRating}" class="w-full px-3 py-2 border rounded-lg text-sm outline-none">
                            <option value="">-- Chọn --</option>
                            <option value="P">P (Mọi lứa tuổi)</option>
                            <option value="C13">C13 (Trên 13 tuổi)</option>
                            <option value="C16">C16 (Trên 16 tuổi)</option>
                            <option value="C18">C18 (Trên 18 tuổi)</option>
                        </select>
                    </div>
                </div>

                <!-- Poster URL -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Poster URL</label>
                    <input type="text" th:field="*{posterUrl}"
                           class="w-full px-3 py-2 border rounded-lg text-sm outline-none"
                           placeholder="https://...">
                </div>

                <!-- Trailer URL -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Trailer URL (YouTube)</label>
                    <input type="text" th:field="*{trailerUrl}"
                           class="w-full px-3 py-2 border rounded-lg text-sm outline-none"
                           placeholder="https://youtube.com/watch?v=...">
                </div>

                <!-- Thể loại -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-2">Thể Loại Phim *</label>
                    <div class="grid grid-cols-3 gap-3 bg-gray-50 p-4 rounded-xl border">
                        <div th:each="g : ${allGenres}" class="flex items-center space-x-2">
                            <input type="checkbox" name="genreIds" th:value="${g.genreId}"
                                   th:checked="${movie.genres != null and movie.genres.contains(g)}"
                                   class="w-4 h-4 text-amber-500 rounded border-gray-300">
                            <label class="text-sm font-medium text-stone-700" th:text="${g.genreName}"></label>
                        </div>
                    </div>
                </div>

                <!-- Mô tả -->
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase mb-1">Mô Tả Phim</label>
                    <textarea th:field="*{description}" rows="3"
                              class="w-full px-3 py-2 border rounded-lg text-sm outline-none"
                              placeholder="Nội dung tóm tắt phim..."></textarea>
                </div>

                <!-- Buttons -->
                <div class="pt-4 border-t flex justify-end space-x-3">
                    <a th:href="@{/admin/movies}" class="px-5 py-2 border rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-100">Hủy</a>
                    <button type="submit" class="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm rounded-lg shadow">Lưu Lại</button>
                </div>
            </form>
        </div>
    </main>

    <div th:replace="~{fragments :: common_footer}"></div>
</body>
</html>
