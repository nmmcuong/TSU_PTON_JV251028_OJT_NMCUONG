<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Quản Lý Lịch Chiếu - Admin')}"></head>
<body class="bg-gray-50 min-h-screen font-sans pt-28 flex flex-col">

    <div th:replace="~{fragments :: common_header}"></div>

    <main class="max-w-7xl mx-auto px-6 md:px-12 py-6 flex-grow w-full">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
            <div class="flex justify-between items-center border-b pb-4 mb-6">
                <div>
                    <h2 class="text-2xl font-black text-stone-900 tracking-wide">🎞️ DANH MỤC LỊCH CHIẾU</h2>
                </div>
                <a th:href="@{/admin/showtimes/create}" class="bg-amber-500 hover:bg-amber-600 text-white font-bold text-xs px-4 py-2.5 rounded-full transition shadow-sm uppercase">
                    + Thêm Lịch Chiếu
                </a>
            </div>

            <div th:if="${param.success}" class="mb-4 bg-green-100 text-green-700 p-3 rounded-lg text-xs font-semibold">🎉 Đã lưu lịch chiếu thành công!</div>
            <div th:if="${param.deleted}" class="mb-4 bg-amber-100 text-amber-700 p-3 rounded-lg text-xs font-semibold">🗑️ Đã xoá lịch chiếu.</div>

            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-stone-900 text-white text-xs uppercase tracking-wider">
                        <th class="p-4 rounded-l-lg">Phim</th>
                        <th class="p-4">Phòng</th>
                        <th class="p-4">Thời Gian Bắt Đầu</th>
                        <th class="p-4 text-right">Giá Vé</th>
                        <th class="p-4 text-center rounded-r-lg">Hành Động</th>
                    </tr>
                </thead>
                <tbody class="text-sm divide-y divide-gray-100 text-stone-700">
                    <tr th:each="showtime : ${showtimes}">
                        <td class="p-4 font-bold text-stone-900" th:text="${showtime.movie != null ? showtime.movie.title : '—'}"></td>
                        <td class="p-4" th:text="${showtime.room != null ? showtime.room.roomName : '—'}"></td>
                        <td class="p-4" th:text="${#temporals.format(showtime.startTime, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="p-4 text-right" th:text="${#numbers.formatDecimal(showtime.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        <td class="p-4 text-center">
                            <a th:href="@{/admin/showtimes/delete/{id}(id=${showtime.showtimeId})}"
                               onclick="return confirm('Xoá lịch chiếu này?')"
                               class="text-red-500 font-bold text-xs underline">Xoá</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(showtimes)}">
                        <td colspan="5" class="p-6 text-center text-gray-400 text-sm">Chưa có lịch chiếu nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments :: common_footer}"></div>
</body>
</html>
