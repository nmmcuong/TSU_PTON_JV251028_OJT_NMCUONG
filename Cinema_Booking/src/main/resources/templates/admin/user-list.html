<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Tài Khoản - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-slate-800 p-4 text-white flex justify-between items-center shadow-md">
        <a href="/" class="text-xl font-bold tracking-wider hover:text-gray-300">← QUAY VỀ TRANG CHỦ</a>
        <span class="bg-red-600 text-xs font-bold px-3 py-1 rounded uppercase">Hệ Thống Admin</span>
    </nav>

    <div class="max-w-6xl mx-auto mt-10 px-4">
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-3">👥 Danh Sách Quản Lý Người Dùng</h2>

            <div th:if="${param.success}" class="mb-4 bg-green-100 text-green-700 p-3 rounded text-sm font-medium">🎉 Cập nhật thông tin tài khoản thành công!</div>
            <div th:if="${param.deleted}" class="mb-4 bg-amber-100 text-amber-700 p-3 rounded text-sm font-medium">🗑️ Đã xóa vĩnh viễn tài khoản khỏi hệ thống!</div>
            <div th:if="${param.error}" class="mb-4 bg-red-100 text-red-700 p-3 rounded text-sm" th:text="${param.error}"></div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-800 text-white text-sm">
                            <th class="p-3">ID</th>
                            <th class="p-3">Tên đăng nhập</th>
                            <th class="p-3">Họ và tên</th>
                            <th class="p-3">Email</th>
                            <th class="p-3">Vai trò (Role)</th>
                            <th class="p-3">Trạng thái</th>
                            <th class="p-3 text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y text-gray-700">
                        <tr th:each="user : ${users}" class="hover:bg-gray-50">
                            <td class="p-3 font-semibold" th:text="${user.id}">1</td>
                            <td class="p-3" th:text="${user.username}">admin</td>
                            
                            <form th:action="@{/admin/users/edit}" method="POST" class="inline">
                                <input type="hidden" name="id" th:value="${user.id}">
                                
                                <td class="p-2">
                                    <input type="text" name="fullName" th:value="${user.fullName}" class="border rounded px-2 py-1 w-full bg-transparent focus:bg-white focus:outline-blue-500">
                                </td>
                                <td class="p-2">
                                    <input type="email" name="email" th:value="${user.email}" class="border rounded px-2 py-1 w-full bg-transparent focus:bg-white focus:outline-blue-500">
                                </td>
                                <td class="p-2">
                                    <select name="role" class="border rounded px-1 py-1 bg-transparent focus:bg-white">
                                        <option value="USER" th:selected="${user.role.name() == 'USER'}">USER</option>
                                        <option value="STAFF" th:selected="${user.role.name() == 'STAFF'}">STAFF</option>
                                        <option value="ADMIN" th:selected="${user.role.name() == 'ADMIN'}">ADMIN</option>
                                    </select>
                                </td>
								<td class="p-2 text-center">
								    <input type="hidden" name="enabled" th:value="${user.enabled}">
								    
								    <div class="inline-block font-semibold text-xs px-2.5 py-1 rounded-full uppercase tracking-wider select-none">
								        <span th:if="${user.enabled}" class="bg-green-100 text-green-800 border border-green-200 px-2.5 py-1 rounded-full">
								            ● Active
								        </span>
								        
								        <span th:if="${!user.enabled}" class="bg-red-100 text-red-800 border border-red-200 px-2.5 py-1 rounded-full">
								            ● Disabled
								        </span>
								    </div>
								</td>
                                <td class="p-2 text-center space-x-2">
                                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-1.5 rounded transition">Lưu</button>
                                    <a th:if="${user.username != 'admin'}" 
                                       th:href="@{/admin/users/delete/{id}(id=${user.id})}" 
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa vĩnh viễn tài khoản này? Action này không thể hoàn tác!')" 
                                       class="bg-red-500 hover:bg-red-600 text-white text-xs px-3 py-1.5 rounded transition">Xóa</a>
                                </td>
                            </form>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
