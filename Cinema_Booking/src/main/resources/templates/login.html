<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Smart Cinema - Đăng Nhập')}"></head>
<body class="bg-gray-100 min-h-screen font-sans pt-28 flex flex-col">

    <div th:replace="~{fragments :: common_header}"></div>

    <div class="max-w-md w-full mx-auto my-auto px-4 flex-grow flex items-center justify-center pb-12">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-200 w-full">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-black text-stone-900 tracking-wide">ĐĂNG NHẬP</h2>
                <p class="text-gray-500 text-xs mt-2">Vui lòng nhập tài khoản thành viên Smart Cinema</p>
            </div>

            <div th:if="${param.error}" class="mb-4 bg-red-100 text-red-700 p-3 rounded-lg text-xs font-medium text-center">
                ❌ Tên đăng nhập hoặc mật khẩu không chính xác!
            </div>
            
            <div th:if="${param.logout}" class="mb-4 bg-green-100 text-green-700 p-3 rounded-lg text-xs font-medium text-center">
                🚪 Bạn đã đăng xuất khỏi hệ thống thành công.
            </div>
			<div th:if="${registerSuccess}" 
			     class="mb-6 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 p-4 rounded-xl text-sm flex items-center gap-3 animate-fade-in">
			    
			    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
			        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
			    </svg>
			    
			    <span class="font-medium" th:text="${registerSuccess}"></span>
			</div>

			<div th:if="${registerError}" 
			     class="mb-6 bg-red-500/10 border border-red-500/30 text-red-400 p-4 rounded-xl text-sm flex items-center gap-3">
			    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
			        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
			    </svg>
			    <span class="font-medium" th:text="${registerError}"></span>
			</div>
            <form th:action="@{/login}" method="POST" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-1">Tên đăng nhập</label>
					<input type="text" name="username" required autofocus
					       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50 focus:bg-white transition"
					       placeholder="Nhập username của bạn">
                </div>
                <div>
                    <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-1">Mật khẩu</label>
					<input type="password" name="password" required
					       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50 focus:bg-white transition"
					       placeholder="••••••••">
                </div>

                <div class="pt-2">
                    <button type="submit" 
                            class="w-full bg-gradient-to-r from-amber-500 to-yellow-500 hover:from-amber-600 hover:to-yellow-600 text-white font-bold py-3 rounded-lg text-sm shadow-md transition duration-300 uppercase tracking-wider">
                        Đăng Nhập
                    </button>
                </div>
            </form>

            <div class="mt-6 flex items-center justify-center space-x-4">
                <span class="h-px bg-gray-300 w-full"></span>
                <span class="text-xs text-gray-400 font-medium whitespace-nowrap">HOẶC ĐĂNG NHẬP BẰNG</span>
                <span class="h-px bg-gray-300 w-full"></span>
            </div>

            <div class="mt-4 flex justify-center">
                <a href="/oauth2/authorization/google" 
                   class="flex items-center justify-center gap-2 border border-stone-300 bg-white rounded-lg py-2.5 px-6 text-sm font-medium text-stone-700 hover:bg-stone-50 transition shadow-sm w-full max-w-xs">
                    <i class="fa-brands fa-google text-red-500 text-base"></i> Google
                </a>
            </div>

            <div class="mt-6 text-center text-xs text-gray-500 border-t pt-4">
                Chưa có tài khoản? 
                <a th:href="@{/register}" class="text-amber-600 hover:underline font-bold ml-1">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: common_footer}"></div>

	<script>
	    // Tìm hộp thông báo thành công
	    const alertBox = document.querySelector('.animate-fade-in');
	    if (alertBox) {
	        // Sau 5000ms (5 giây) thì tự động ẩn đi mượt mà
	        setTimeout(() => {
	            alertBox.style.transition = 'opacity 0.5s ease';
	            alertBox.style.opacity = '0';
	            setTimeout(() => alertBox.remove(), 500);
	        }, 5000);
	    }
	</script>
</body>
</html>
