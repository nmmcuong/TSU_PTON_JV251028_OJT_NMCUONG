<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Smart Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">ĐĂNG NHẬP</h2>
        
        <div th:if="${param.success}" class="mb-4 bg-green-100 border border-green-400 text-green-700 px-4 p-3 rounded text-sm">
            Đăng ký thành công! Vui lòng đăng nhập.
        </div>
        <div th:if="${param.error}" class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 p-3 rounded text-sm">
            Tài khoản hoặc mật khẩu không chính xác!
        </div>

        <form th:action="@{/login}" method="POST" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Tên đăng nhập</label>
                <input type="text" name="username" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Mật khẩu</label>
                <input type="password" name="password" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-200">
                Đăng Nhập
            </button>
        </form>
        <p class="mt-4 text-sm text-center text-gray-600">
            Chưa có tài khoản? <a th:href="@{/register}" class="text-blue-500 hover:underline">Đăng ký ngay</a>
        </p>
    </div>
</body>
</html>
