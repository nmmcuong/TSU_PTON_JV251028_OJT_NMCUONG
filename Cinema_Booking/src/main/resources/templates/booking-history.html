<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Smart Cinema - Lịch Sử Đặt Vé')}"></head>
<body class="bg-stone-900 text-stone-100 min-h-screen font-sans pt-20 flex flex-col">

    <div th:replace="~{fragments :: common_header}"></div>

    <main class="max-w-6xl mx-auto px-4 py-10 flex-grow w-full">
        <h2 class="text-3xl font-bold mb-6 flex items-center gap-2 text-amber-400">
            🎬 Lịch sử đặt vé của bạn
        </h2>

        <div th:if="${successMessage}" class="mb-4 bg-green-500/10 border border-green-500/30 text-green-400 p-4 rounded-xl text-sm" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="mb-4 bg-red-500/10 border border-red-500/30 text-red-400 p-4 rounded-xl text-sm" th:text="${errorMessage}"></div>

        <div th:unless="${#lists.isEmpty(historyList)}" class="overflow-x-auto rounded-xl shadow-lg border border-stone-800">
            <table class="min-w-full divide-y divide-stone-800 text-left text-sm">
                <thead class="bg-stone-950 text-stone-400 uppercase tracking-wider text-xs">
                    <tr>
                        <th class="px-6 py-4">Mã Đơn</th>
                        <th class="px-6 py-4">Tên Phim</th>
                        <th class="px-6 py-4">Suất Chiếu</th>
                        <th class="px-6 py-4">Ghế Ngồi</th>
                        <th class="px-6 py-4">Tổng Tiền</th>
                        <th class="px-6 py-4">Trạng Thái & Thao Tác</th> </tr>
                </thead>
                <tbody class="divide-y divide-stone-800 bg-stone-900/50">
                    <tr th:each="booking : ${historyList}" class="hover:bg-stone-800/60 transition">
                        <td th:text="'#' + ${booking.bookingId}" class="px-6 py-4 font-bold text-amber-500"></td>
                        <td th:text="${booking.showtime.movie.title}" class="px-6 py-4 font-semibold text-white"></td>
                        <td th:text="${#temporals.format(booking.showtime.startTime, 'dd/MM/yyyy HH:mm')}" class="px-6 py-4 text-stone-300"></td>
                        <td class="px-6 py-4">
                            <div class="flex flex-wrap gap-1">
                                <span th:each="seat : ${#strings.arraySplit(booking.bookingSeatArray, ',')}" 
                                      class="bg-stone-800 text-amber-400 text-xs font-semibold px-2 py-1 rounded border border-stone-700" th:text="${seat}"></span>
                            </div>
                        </td>
                        <td th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'" class="px-6 py-4 font-bold text-red-400"></td>
                        
                        <td class="px-6 py-4">
                            <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                                <span th:if="${booking.bookingStatus != null && booking.bookingStatus.name() == 'CONFIRMED'}" class="inline-flex bg-green-500/10 text-green-400 px-2.5 py-1 rounded-full text-xs font-medium border border-green-500/20">Thành công</span>
                                <span th:if="${booking.bookingStatus != null && booking.bookingStatus.name() == 'PENDING'}" class="inline-flex bg-yellow-500/10 text-yellow-400 px-2.5 py-1 rounded-full text-xs font-medium border border-yellow-500/20">Chờ xử lý</span>
                                <span th:if="${booking.bookingStatus != null && booking.bookingStatus.name() == 'FAILED'}" class="inline-flex bg-red-500/10 text-red-400 px-2.5 py-1 rounded-full text-xs font-medium border border-red-500/20">Thất bại</span>
                                <span th:if="${booking.bookingStatus != null && booking.bookingStatus.name() == 'CANCELED'}" class="inline-flex bg-stone-700/50 text-stone-400 px-2.5 py-1 rounded-full text-xs font-medium border border-stone-700">Đã hủy</span>

                                <form th:if="${booking.bookingStatus != null && booking.bookingStatus.name() == 'CONFIRMED'}" 
                                      th:action="@{/booking/cancel/{id}(id=${booking.bookingId})}" 
                                      method="POST" 
                                      onsubmit="return confirm('Bạn có chắc chắn muốn hủy vé này không? Ghế sẽ được giải phóng ngay lập tức.');">
                                    <button type="submit" class="text-xs bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white px-3 py-1 rounded-lg border border-red-500/30 transition duration-200">
                                        Hủy vé
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments :: common_footer}"></div>
</body>
</html>
