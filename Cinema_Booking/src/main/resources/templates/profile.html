<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ Cá Nhân</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-md">
        <a href="/" class="text-xl font-bold tracking-wider hover:text-gray-200">← SMART CINEMA</a>
        <form th:action="@{/logout}" method="POST">
            <button type="submit" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-md font-semibold text-sm transition duration-200">Đăng xuất</button>
        </form>
    </nav>

    <div class="max-w-3xl mx-auto mt-10 px-4 pb-12">
        <div class="bg-white rounded-lg shadow-md p-8">
            
            <div class="flex justify-between items-center border-b pb-4 mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Thông Tin Cá Nhân</h2>
                    <p class="text-gray-500 text-xs mt-1">Quản lý và cập nhật thông tin tài khoản của bạn để nhận ưu đãi.</p>
                </div>
                <div>
                    <span th:if="${userRole == 'ADMIN'}" class="bg-red-100 text-red-800 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider">Hệ Thống Admin</span>
                    <span th:if="${userRole == 'STAFF'}" class="bg-amber-100 text-amber-800 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider">Nhân Viên Rạp</span>
                    <span th:if="${userRole == 'USER'}" class="bg-green-100 text-green-800 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider">Khách Hàng Thân Thiết</span>
                </div>
            </div>

            <div th:if="${param.success}" class="mb-4 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded text-sm font-medium">
                🎉 Cập nhật hồ sơ cá nhân thành công!
            </div>
            <div th:if="${errorMessage}" class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded text-sm" th:text="${errorMessage}"></div>

            <form th:action="@{/profile/update}" th:object="${profileDto}" method="POST" class="space-y-5">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Họ và tên *</label>
                        <input type="text" th:field="*{fullName}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-red-500 text-xs mt-1"></p>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Email hệ thống *</label>
                        <input type="email" th:field="*{email}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-xs mt-1"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Địa chỉ cư trú</label>
                        <input type="text" th:field="*{address}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Giới tính</label>
                        <select th:field="*{gender}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white">
                            <option value="">-- Chọn giới tính --</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Ngày sinh</label>
						<input type="date" 
						       th:name="birthday" 
						       th:value="${profileDto.birthday != null ? #temporals.format(profileDto.birthday, 'yyyy-MM-dd') : ''}" 
						       class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                </div>

                <div class="pt-4 border-t flex justify-end space-x-3">
                    <a href="/" class="px-5 py-2 border rounded-md text-sm font-semibold text-gray-600 hover:bg-gray-100 transition">Hủy bỏ</a>
                    <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm rounded-md shadow transition">Lưu Thay Đổi</button>
                </div>
            </form>

        </div>
    </div>
</body>
</html>
