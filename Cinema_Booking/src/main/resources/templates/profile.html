<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Hồ Sơ Cá Nhân')}"></head>
<body class="bg-gray-100 min-h-screen font-sans pt-28 flex flex-col">

    <div th:replace="~{fragments :: common_header}"></div>

    <div class="max-w-3xl mx-auto px-4 pb-12 w-full flex-grow">
        <div class="bg-white rounded-lg shadow-md p-8 border border-gray-200">
            <div class="flex justify-between items-center border-b pb-4 mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Thông Tin Cá Nhân</h2>
                    <p class="text-gray-500 text-xs mt-1">Quản lý và cập nhật thông tin tài khoản của bạn.</p>
                </div>
                <div>
                    <span th:if="${userRole == 'ADMIN'}" class="bg-red-100 text-red-800 text-xs font-bold px-3 py-1.5 rounded-full uppercase">Hệ Thống Admin</span>
                    <span th:if="${userRole == 'STAFF'}" class="bg-amber-100 text-amber-800 text-xs font-bold px-3 py-1.5 rounded-full uppercase">Nhân Viên Rạp</span>
                    <span th:if="${userRole == 'USER'}" class="bg-green-100 text-green-800 text-xs font-bold px-3 py-1.5 rounded-full uppercase">Khách Hàng</span>
                </div>
            </div>

            <form th:action="@{/profile/update}" th:object="${profileDto}" method="POST" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Họ và tên *</label>
                        <input type="text" th:field="*{fullName}" class="w-full px-3 py-2 border rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Email hệ thống *</label>
                        <input type="email" th:field="*{email}" class="w-full px-3 py-2 border rounded-md text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Giới tính</label>
                        <select th:field="*{gender}" class="w-full px-3 py-2 border rounded-md text-sm bg-white">
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Ngày sinh</label>
                        <input type="date" th:name="birthday" th:value="${profileDto.birthday != null ? #temporals.format(profileDto.birthday, 'yyyy-MM-dd') : ''}" class="w-full px-3 py-2 border rounded-md text-sm">
                    </div>
                </div>
                <div class="pt-4 border-t flex justify-end space-x-3">
                    <a href="/" class="px-5 py-2 border rounded-md text-sm font-semibold text-gray-600 hover:bg-gray-100">Hủy bỏ</a>
                    <button type="submit" class="px-5 py-2 bg-amber-500 hover:bg-amber-600 text-white font-semibold text-sm rounded-md shadow">Lưu Thay Đổi</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments :: common_footer}"></div>
</body>
</html>
