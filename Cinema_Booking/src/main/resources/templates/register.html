<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Tài Khoản</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-lg">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">ĐĂNG KÝ TÀI KHOẢN</h2>
        
        <div th:if="${errorMessage}" class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 p-3 rounded text-sm" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" th:object="${userDto}" method="POST" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-1">Tên đăng nhập *</label>
                <input type="text" th:field="*{username}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-red-500 text-xs mt-1"></p>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-1">Mật khẩu *</label>
                <input type="password" th:field="*{password}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-500 text-xs mt-1"></p>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-1">Email *</label>
                <input type="email" th:field="*{email}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-xs mt-1"></p>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-1">Họ và tên *</label>
                <input type="text" th:field="*{fullName}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-red-500 text-xs mt-1"></p>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-1">Số điện thoại</label>
                <input type="text" th:field="*{phone}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-1">Địa chỉ</label>
                <input type="text" th:field="*{address}" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-md transition duration-200">
                Đăng Ký
            </button>
        </form>
        <p class="mt-4 text-sm text-center text-gray-600">
            Đã có tài khoản? <a th:href="@{/login}" class="text-blue-500 hover:underline">Đăng nhập</a>
        </p>
    </div>
</body>
</html>
