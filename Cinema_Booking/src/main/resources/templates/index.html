<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: html_head('Smart Cinema - Trang Chủ')}"></head>
<body class="bg-white text-stone-900 min-h-screen font-sans pt-20 flex flex-col">

    <div th:replace="~{fragments :: common_header}"></div>

    <main class="max-w-7xl mx-auto px-6 md:px-12 py-10 space-y-12 flex-grow w-full">
        <div th:if="${currentUser != null}" class="bg-amber-50/60 p-6 rounded-2xl border border-amber-200 shadow-sm">
            <h2 class="text-xl font-bold text-amber-800">🎉 Chào mừng trở lại, <span th:text="${currentUser.fullName}">Khách</span>!</h2>
        </div>

        <div class="relative h-[450px] rounded-3xl overflow-hidden shadow-xl group">
            
            <div th:if="${sliderMovies != null and !sliderMovies.isEmpty()}">
                <div th:each="movie, iterStat : ${sliderMovies}" 
                     th:classappend="${iterStat.first} ? 'active' : ''"
                     class="slide-carousel absolute inset-0 bg-stone-900 transition-opacity duration-1000 opacity-0 flex items-center px-12 text-white overflow-hidden">
                    
                    <!-- Ảnh nền mờ -->
                    <div class="absolute inset-0 z-0 opacity-40">
                        <img th:if="${movie.posterUrl != null and !movie.posterUrl.isEmpty()}" 
                             th:src="${movie.posterUrl}" 
                             class="w-full h-full object-cover blur-sm transform scale-105" alt="Background">
                        <div class="absolute inset-0 bg-gradient-to-r from-stone-950 via-stone-950/80 to-transparent"></div>
                    </div>

                    <!-- Nội dung phim -->
                    <div class="relative z-10 max-w-xl space-y-4">
                        <span class="bg-amber-500 text-black text-[10px] font-black px-2.5 py-1 rounded uppercase tracking-widest">
                            SẮP CHIẾU
                        </span>
                        <h2 class="text-5xl font-black leading-none drop-shadow-lg" th:text="${movie.title}">TÊN PHIM</h2>
                        <p class="text-stone-300 text-sm line-clamp-3" th:text="${movie.description}">Mô tả nội dung phim...</p>
                        <p class="text-amber-400 text-sm font-bold mt-2">
                            <i class="fa-solid fa-calendar-day mr-1"></i> Khởi chiếu: <span th:text="${#temporals.format(movie.releaseDate, 'dd/MM/yyyy')}"></span>
                        </p>
                        <a th:href="@{/movie/{id}/showtimes(id=${movie.movieId})}" class="inline-block mt-4 bg-white text-black font-bold text-xs px-6 py-3 rounded-full hover:bg-amber-400 transition shadow-md">
                            XEM CHI TIẾT
                        </a>
                    </div>
                    
                    <!-- Ảnh Poster rõ ở bên phải (chỉ hiện trên màn hình to) -->
                    <div class="relative z-10 hidden md:block ml-auto mr-10 shadow-2xl rounded-2xl overflow-hidden border-2 border-stone-700/50">
                        <img th:if="${movie.posterUrl != null and !movie.posterUrl.isEmpty()}" 
                             th:src="${movie.posterUrl}" 
                             class="w-64 h-[350px] object-cover" alt="Poster">
                    </div>
                </div>
            </div>

            <div th:if="${sliderMovies == null or sliderMovies.isEmpty()}" class="absolute inset-0 bg-stone-900 flex items-center justify-center text-stone-500">
                <p>Đang cập nhật danh sách phim mới...</p>
            </div>

            <button onclick="changeSlide(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/40 text-white p-3 rounded-full hover:bg-amber-500 hover:text-black opacity-0 group-hover:opacity-100 transition duration-300 z-20">❮</button>
            <button onclick="changeSlide(1)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/40 text-white p-3 rounded-full hover:bg-amber-500 hover:text-black opacity-0 group-hover:opacity-100 transition duration-300 z-20">❯</button>
        </div>

        <!-- ===== DANH SÁCH PHIM ĐANG CHIẾU ===== -->
        <div class="space-y-6">
            <div class="flex justify-between items-center border-b border-stone-200 pb-4">
                <h3 class="text-2xl font-black text-stone-900 tracking-wide">🎬 PHIM ĐANG CHIẾU</h3>
                <a href="#" class="text-amber-600 hover:text-amber-700 text-sm font-bold">Xem tất cả ➔</a>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                <div th:each="movie : ${movies}" th:if="${movie.status.name() == 'NOW_SHOWING'}"
                     class="bg-white rounded-2xl overflow-hidden shadow-md border border-stone-100 hover:shadow-xl transition duration-300 flex flex-col group">
                    
                    <!-- Poster -->
                    <div class="relative overflow-hidden aspect-[2/3]">
                        <img th:if="${movie.posterUrl != null and !movie.posterUrl.isEmpty()}" 
                             th:src="${movie.posterUrl}" 
                             alt="Poster" 
                             class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        <div th:unless="${movie.posterUrl != null and !movie.posterUrl.isEmpty()}" 
                             class="w-full h-full bg-stone-100 flex items-center justify-center text-5xl">🎬</div>
                        
                        <!-- Badge thời lượng -->
                        <span class="absolute bottom-3 right-3 bg-black/70 text-white text-[10px] font-bold px-2 py-1 rounded backdrop-blur-sm">
                            ⏱️ <span th:text="${movie.duration}">120</span> phút
                        </span>
                    </div>

                    <!-- Details -->
                    <div class="p-4 flex-grow flex flex-col justify-between space-y-3">
                        <div class="space-y-1">
                            <h4 class="font-extrabold text-stone-900 line-clamp-1 group-hover:text-amber-600 transition" 
                                th:text="${movie.title}">Tên Phim</h4>
                            <p class="text-xs text-stone-500">
                                <span th:each="genre, iter : ${movie.genres}">
                                    <span th:text="${genre.genreName}">Hành động</span><span th:if="${!iter.last}">, </span>
                                </span>
                            </p>
                        </div>

                        <a th:href="@{/movie/{id}/showtimes(id=${movie.movieId})}" 
                           class="w-full text-center bg-stone-900 text-white font-bold text-xs py-2.5 rounded-xl hover:bg-amber-500 hover:text-black transition duration-200 shadow-sm uppercase tracking-wider">
                            🎟️ Mua Vé
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== DANH SÁCH PHIM SẮP CHIẾU ===== -->
        <div class="space-y-6">
            <div class="flex justify-between items-center border-b border-stone-200 pb-4">
                <h3 class="text-2xl font-black text-stone-900 tracking-wide">📅 PHIM SẮP CHIẾU</h3>
                <a href="#" class="text-amber-600 hover:text-amber-700 text-sm font-bold">Xem tất cả ➔</a>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                <div th:each="movie : ${movies}" th:if="${movie.status.name() == 'COMING_SOON'}"
                     class="bg-white rounded-2xl overflow-hidden shadow-md border border-stone-100 opacity-80 hover:opacity-100 transition duration-300 flex flex-col">
                    
                    <!-- Poster -->
                    <div class="relative overflow-hidden aspect-[2/3]">
                        <img th:if="${movie.posterUrl != null and !movie.posterUrl.isEmpty()}" 
                             th:src="${movie.posterUrl}" 
                             alt="Poster" 
                             class="w-full h-full object-cover">
                        <div th:unless="${movie.posterUrl != null and !movie.posterUrl.isEmpty()}" 
                             class="w-full h-full bg-stone-100 flex items-center justify-center text-5xl">🎬</div>
                        
                        <span class="absolute top-3 left-3 bg-amber-500 text-black text-[9px] font-black px-2 py-0.5 rounded uppercase tracking-wider">
                            Coming Soon
                        </span>
                    </div>

                    <!-- Details -->
                    <div class="p-4 flex-grow flex flex-col justify-between space-y-3">
                        <div class="space-y-1">
                            <h4 class="font-extrabold text-stone-900 line-clamp-1" th:text="${movie.title}">Tên Phim</h4>
                            <p class="text-xs text-stone-500">
                                <span th:each="genre, iter : ${movie.genres}">
                                    <span th:text="${genre.genreName}">Hành động</span><span th:if="${!iter.last}">, </span>
                                </span>
                            </p>
                        </div>

                        <button disabled class="w-full text-center bg-stone-200 text-stone-500 font-bold text-xs py-2.5 rounded-xl cursor-not-allowed uppercase tracking-wider">
                            Chưa mở bán
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: common_footer}"></div>

    <script>
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide-carousel');
        
        if(slides.length > 0) {
            function showSlide(index) {
                slides[currentSlideIndex].classList.remove('active', 'opacity-100', 'z-10');
                slides[currentSlideIndex].classList.add('opacity-0', 'z-0');
                
                currentSlideIndex = (index + slides.length) % slides.length;
                
                slides[currentSlideIndex].classList.remove('opacity-0', 'z-0');
                slides[currentSlideIndex].classList.add('active', 'opacity-100', 'z-10');
            }
            function changeSlide(direction) { showSlide(currentSlideIndex + direction); }
            // Khởi tạo slide đầu tiên
            slides[0].classList.remove('opacity-0', 'z-0');
            slides[0].classList.add('active', 'opacity-100', 'z-10');
            
            // Tự động chuyển slide sau mỗi 5 giây
            setInterval(() => { changeSlide(1); }, 5000);
        }
    </script>
</body>
</html>
